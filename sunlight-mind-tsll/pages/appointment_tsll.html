<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>咨询预约 · 晴心 SunlightMind</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="stylesheet" href="../assets/css/site_tsll.css" />
<style>
  /* === 心理咨询预约 appointment_tsll === */
  .apt-hero{
    background:linear-gradient(135deg,#FFE4B5,#A6D8E7);
    padding:36px;border-radius:20px;margin-bottom:24px;
    display:grid;grid-template-columns:1fr 240px;gap:20px;align-items:center;position:relative;overflow:hidden
  }
  @media(max-width:780px){.apt-hero{grid-template-columns:1fr}.apt-hero .ph-illu{display:none}}
  .apt-hero h1{font-size:28px;font-weight:800}
  .apt-hero p{color:#5e4f3f;margin-top:8px;line-height:1.8}
  .apt-hero .ph-illu{
    width:100%;aspect-ratio:1;border-radius:16px;
    background:linear-gradient(135deg,rgba(255,255,255,.4),rgba(123,196,160,.4));
    display:flex;align-items:center;justify-content:center;font-size:80px;
    border:2px dashed rgba(255,255,255,.7);position:relative;
    overflow:hidden;
  }
  .apt-hero .ph-illu img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .apt-hero .ph-illu.has-real-img{border:0}
  .apt-hero .ph-illu.has-real-img .img-fallback{display:none}
  .apt-hero .ph-illu::after{content:"图片位:咨询师/沙发/绿植插画 (assets/images/counsel-illu.png)";position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:#5e4f3f}

  /* 步骤条 */
  .stepper{display:flex;align-items:center;justify-content:center;margin-bottom:24px;gap:12px}
  .stepper .st{display:flex;align-items:center;gap:8px}
  .stepper .dot{width:32px;height:32px;border-radius:50%;background:var(--bg2);color:var(--muted);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .stepper .st.on .dot{background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;box-shadow:0 4px 12px rgba(245,166,35,.4)}
  .stepper .st.done .dot{background:var(--accent2);color:#fff}
  .stepper .lbl{font-size:13px;color:var(--muted)}
  .stepper .st.on .lbl{color:var(--ink);font-weight:700}
  .stepper .line{width:60px;height:2px;background:var(--rule)}

  .step-box{display:none;animation:fade .4s}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  /* Step1 咨询师 */
  .grid-c{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px;align-items:stretch}
  .c-card{background:#fff;border-radius:20px;padding:28px 22px;box-shadow:var(--shadow);cursor:pointer;border:2.5px solid transparent;transition:.25s;position:relative;display:flex;flex-direction:column;gap:14px;align-items:stretch}

  .c-card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(245,166,35,.18)}
  .c-card.sel{border-color:var(--accent);background:linear-gradient(180deg,#FFF8E7,#fff)}
  .c-card.sel::before{content:"✓";position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;z-index:3}
  
  .c-card-top{display:flex;gap:18px;align-items:flex-start}
  
  .c-photo{
    width:100px;height:100px;border-radius:16px;flex-shrink:0;
    background:linear-gradient(135deg,#FFE4B5,#FFD580);
    border:2px dashed var(--accent);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .c-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .c-photo.real-photo{border:0;box-shadow:0 8px 20px rgba(0,0,0,.12)}
  .c-photo.real-photo .ph-icon,.c-photo.real-photo .ph-text{display:none}
  .c-photo .ph-icon{font-size:36px;margin-bottom:2px;z-index:1}
  .c-photo .ph-text{font-size:9px;color:var(--muted);font-weight:600;z-index:1;background:rgba(255,255,255,.7);padding:2px 8px;border-radius:999px}
  .c-info{flex:1;min-width:0}
  .c-name{font-weight:800;font-size:18px;margin-bottom:2px}
  .c-title{font-size:12px;color:var(--muted);margin-bottom:8px}
  .c-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .c-tags .tag{font-size:10px;padding:2px 8px}
  .c-card .recommend-badge{
    position:absolute;top:-10px;left:-10px;
    background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;
    font-size:11px;font-weight:700;padding:5px 10px;border-radius:999px;
    box-shadow:0 4px 12px rgba(245,166,35,.45);
    animation:badgeGlow 2s ease-in-out infinite;z-index:4;
  }
  @keyframes badgeGlow{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .c-card .tag.match-hit{background:linear-gradient(135deg,#FFE4B5,#FFD580);color:#B87333;font-weight:700}
  
  .c-stats{display:flex;gap:16px;font-size:12px;color:var(--muted);margin-top:auto} 
  .c-stats b{color:var(--accent);font-size:15px;margin-right:2px}
  .c-stats .rate-clickable{cursor:pointer;transition:.2s;padding:2px 6px;border-radius:6px}
  .c-stats .rate-clickable:hover{background:rgba(245,166,35,.1);transform:scale(1.05)}
  @media (max-width:1100px){.grid-c{grid-template-columns:repeat(2,minmax(0,1fr))}}
  @media (max-width:680px){.grid-c{grid-template-columns:1fr}}
  /* ★ 改：手机端适配也对应调整 */
  @media (max-width:500px){.c-card{align-items:center;text-align:center}.c-card-top{flex-direction:column;align-items:center}.c-info{text-align:center}.c-tags{justify-content:center}.c-stats{justify-content:center}}
 
  /* ===== 评价弹窗 ===== */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(4px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn .3s}
  .modal-overlay.show{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .modal-box{background:#fff;border-radius:24px;width:100%;max-width:600px;max-height:85vh;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:slideUp .4s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column}
  @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
  .modal-head{padding:24px 28px 16px;border-bottom:1px solid var(--rule);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .modal-head h3{font-size:18px;font-weight:800;display:flex;align-items:center;gap:10px}
  .modal-head .modal-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--bg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.2s}
  .modal-head .modal-close:hover{background:var(--rule);transform:rotate(90deg)}
  .modal-body{padding:20px 28px;overflow-y:auto;flex:1}
  .review-summary{display:flex;align-items:center;gap:20px;margin-bottom:20px;padding:16px;background:linear-gradient(135deg,#FFF8E7,#FFF0E0);border-radius:16px}
  .review-summary .big-rate{font-size:42px;font-weight:800;color:var(--accent);line-height:1}
  .review-summary .stars{font-size:20px;color:var(--accent);letter-spacing:2px}
  .review-summary .summary-text{font-size:13px;color:var(--muted);margin-top:4px}
  .review-item{padding:16px 0;border-bottom:1px dashed var(--rule)}
  .review-item:last-child{border-bottom:none}
  .review-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .review-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FFE4B5,#FFB7B2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff}
  .review-meta{flex:1}
  .review-meta .name{font-weight:700;font-size:14px}
  .review-meta .time{font-size:11px;color:var(--muted)}
  .review-stars{color:var(--accent);font-size:14px;letter-spacing:1px}
  .review-tags{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
  .review-tags .rtag{font-size:11px;padding:3px 10px;border-radius:999px;background:var(--bg2);color:var(--muted)}
  .review-content{font-size:14px;line-height:1.8;color:var(--ink)}
  .review-content .highlight{color:var(--accent);font-weight:600}
  @media(max-width:600px){.modal-box{max-height:90vh;border-radius:16px}.modal-head{padding:18px 20px 12px}.modal-body{padding:16px 20px}}

  /* ===== 推荐区域 ===== */
  .rec-section{margin-bottom:24px}
  .rec-section .rec-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .rec-section .rec-head h3{font-size:16px;font-weight:800}
  .rec-section .rec-head .rec-sub{font-size:13px;color:var(--muted)}
  .rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  @media(max-width:900px){.rec-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:600px){.rec-grid{grid-template-columns:1fr}}
  .rec-card{background:#fff;border-radius:16px;padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:.25s;border:2px solid transparent;position:relative;overflow:hidden}
  .rec-card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(245,166,35,.18);border-color:var(--accent)}
  .rec-card .rec-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px}
  .rec-card .rec-photo{width:64px;height:64px;border-radius:14px;object-fit:cover;margin-bottom:10px}
  .rec-card .rec-name{font-weight:800;font-size:15px;margin-bottom:2px}
  .rec-card .rec-title{font-size:12px;color:var(--muted);margin-bottom:8px}
  .rec-card .rec-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
  .rec-card .rec-tags .tag{font-size:10px;padding:2px 8px}
  .rec-card .rec-reason{font-size:12px;color:var(--accent);background:linear-gradient(135deg,#FFF8E7,#FFF0E0);padding:8px 12px;border-radius:10px;margin-top:8px;line-height:1.6}
  .rec-card .rec-reason::before{content:"💡 ";font-size:14px}
  .rec-card .rec-stats{display:flex;gap:12px;font-size:12px;color:var(--muted);margin-top:10px}
  .rec-card .rec-stats b{color:var(--accent)}

  /* Step2 时间 */
  .date-row{display:flex;gap:10px;overflow-x:auto;margin-bottom:20px;padding:6px 2px}
  .d-card{flex-shrink:0;min-width:90px;background:#fff;border-radius:12px;padding:14px 6px;text-align:center;cursor:pointer;border:2px solid var(--rule);transition:.2s}
  .d-card:hover{border-color:var(--accent)}
  .d-card.sel{background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;border-color:transparent}
  .d-card .wk{font-size:12px;opacity:.7}
  .d-card .dy{font-size:22px;font-weight:800;margin:4px 0}
  .d-card .mn{font-size:11px;opacity:.7}

  .slots{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
  .slot{padding:14px;border-radius:10px;background:#fff;text-align:center;cursor:pointer;border:2px solid var(--rule);font-size:14px;transition:.2s}
  .slot:hover{border-color:var(--accent)}
  .slot.sel{background:var(--accent);color:#fff;border-color:transparent}
  .slot.dis{background:#f5f5f5;color:#bbb;cursor:not-allowed;text-decoration:line-through}

  /* Step3 表单 */
  .form-row{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:14px}
  @media(max-width:680px){.form-row{grid-template-columns:1fr}}
  .form-row label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
  .topic-pick{display:flex;flex-wrap:wrap;gap:8px}
  .topic-pick span{padding:6px 14px;border-radius:999px;background:var(--bg2);font-size:13px;cursor:pointer;border:1.5px solid transparent;transition:.2s}
  .topic-pick span:hover{border-color:var(--accent)}
  .topic-pick span.on{background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;border-color:transparent}

  /* Step4 结果 */
  .result{text-align:center;padding:40px 20px}
  .res-icon{
  width:120px;
  height:120px;
  margin:0 auto 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  animation:pop .6s cubic-bezier(.5,1.6,.4,1);
}

.res-icon svg{
  width:110px;
  height:110px;
}

.res-icon::before,
.res-icon::after{
  content:"";
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  opacity:0;
  animation:confetti 1.2s ease-out .9s forwards;
}

.res-icon::before{
  left:10px;
  top:20px;
}

.res-icon::after{
  right:12px;
  top:28px;
  background:var(--accent2);
}

@keyframes pop{
  0%{transform:scale(0)}
  80%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

@keyframes confetti{
  0%{transform:translateY(0) scale(0);opacity:0}
  40%{opacity:1}
  100%{transform:translateY(-35px) scale(1.4);opacity:0}
}
  @keyframes pop{0%{transform:scale(0)}80%{transform:scale(1.1)}100%{transform:scale(1)}}
  .res-title{font-size:24px;font-weight:800;margin-bottom:10px}
  .res-no{font-size:14px;color:var(--muted);margin-bottom:24px}
  .res-info{background:#FFF8E7;border-radius:14px;padding:24px;text-align:left;max-width:480px;margin:0 auto;display:grid;grid-template-columns:auto 1fr;gap:10px 24px}
  .res-info .k{color:var(--muted);font-size:13px}
  .res-info .v{font-weight:600;font-size:14px}

  /* 我的预约 */
  .apt-list .item{display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;padding:14px 0;border-bottom:1px dashed var(--rule)}
  .apt-list .item:last-child{border-bottom:none}
  .apt-list .item .av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#FFE4B5,#FFB7B2);display:flex;align-items:center;justify-content:center;font-size:24px}
  .apt-list .item .info b{display:block}
  .apt-list .item .info small{color:var(--muted)}
  .badge-st{padding:4px 12px;border-radius:999px;font-size:12px;font-weight:600}
  .st-pending{background:#FFE4B5;color:#B87333}
  .st-done{background:#7BC4A0;color:#fff}
  .st-cancel{background:#f5f5f5;color:#999}

  .nav-row{display:flex;justify-content:space-between;margin-top:24px}
  .step-box{ display:none; }
.step-box.show{
  display:block;
  animation: slideInUp .5s cubic-bezier(.2,.8,.2,1);
}
@keyframes slideInUp{
  from{ opacity:0; transform: translateY(20px); }
  to  { opacity:1; transform: translateY(0); }
}

</style>
</head>
<body>
<div class="wrap" style="padding-top:0">

  <section class="apt-hero">
    <div>
      <h1>🌷 心理咨询预约</h1>
      <p>专业咨询师 1V1 倾听 · 严格保密 · 校内免费<br />在这里,你可以放下伪装,被认真倾听。</p>
    </div>
    <div class="ph-illu">
      <img src="../assets/images/counsel-illu.png" alt="咨询预约插画" onload="this.parentElement.classList.add('has-real-img')" onerror="this.style.display='none'">
      <span class="img-fallback">🛋️</span>
    </div>
  </section>

  <!-- 步骤条 -->
  <div class="stepper" id="stepper">
    <div class="st on" data-i="1"><div class="dot">1</div><span class="lbl">选咨询师</span></div>
    <div class="line"></div>
    <div class="st" data-i="2"><div class="dot">2</div><span class="lbl">选时间</span></div>
    <div class="line"></div>
    <div class="st" data-i="3"><div class="dot">3</div><span class="lbl">填写信息</span></div>
    <div class="line"></div>
    <div class="st" data-i="4"><div class="dot">4</div><span class="lbl">完成</span></div>
  </div>

  <!-- 推荐咨询师区域 -->
  <section class="rec-section" id="recSection">
    <div class="rec-head">
      <h3>✨ 为你推荐</h3>
      <span class="rec-sub">根据你的需求智能匹配</span>
    </div>
    <div class="rec-grid" id="recGrid"></div>
  </section>

  <!-- Step 1 -->
  <section class="step-box show" id="step1">
    <div class="panel-head" style="margin-bottom:16px"><h3>👨‍⚕️ 选择适合你的咨询师</h3><span class="more" style="cursor:default">共 6 位在线</span></div>
    <div class="grid-c" id="cList"></div>
    <div class="nav-row">
      <span></span>
      <button class="btn btn-primary" id="next1">下一步 ➤</button>
    </div>
  </section>

  <!-- Step 2 -->
  <section class="step-box" id="step2">
    <div class="panel-head" style="margin-bottom:16px"><h3>📅 选择日期与时段</h3></div>
    <div class="date-row" id="dateRow"></div>
    <h4 style="margin:18px 0 12px;font-size:14px">⏰ 时间段(每场 50 分钟)</h4>
    <div class="slots" id="slotGrid"></div>
    <div class="nav-row">
      <button class="btn btn-ghost" data-back>← 上一步</button>
      <button class="btn btn-primary" id="next2">下一步 ➤</button>
    </div>
  </section>

  <!-- Step 3 -->
  <section class="step-box" id="step3">
    <div class="panel-head" style="margin-bottom:16px"><h3>📝 填写预约信息</h3></div>
    <div class="panel">
      <div class="form-row">
        <div><label>姓名(可使用化名)</label><input class="input" id="fName" placeholder="例:小明" /></div>
        <div><label>联系手机</label><input class="input" id="fPhone" placeholder="11位手机号" maxlength="11" /></div>
      </div>
      <div class="form-row">
        <div><label>咨询方式</label>
          <select class="select" id="fWay"><option>面对面咨询</option><option>语音咨询</option><option>视频咨询</option><option>文字咨询</option></select>
        </div>
        <div><label>是否首次咨询</label>
          <select class="select" id="fFirst"><option>是</option><option>否</option></select>
        </div>
      </div>
      <label style="font-size:13px;font-weight:700;display:block;margin-bottom:8px">咨询主题(可多选)</label>
      <div class="topic-pick" id="topicPick">
        <span>学业压力</span><span>人际关系</span><span>恋爱情感</span><span>家庭矛盾</span>
        <span>就业焦虑</span><span>自我探索</span><span>失眠困扰</span><span>情绪低落</span>
      </div>
      <label style="font-size:13px;font-weight:700;display:block;margin:14px 0 8px">想倾诉的内容(可省略)</label>
      <textarea class="textarea" id="fContent" placeholder="简单描述一下当前状况,会帮助咨询师更好地准备..."></textarea>
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;color:var(--muted)">
        <input type="checkbox" id="fAgree" checked /> 我已阅读并同意《心理咨询保密协议》《来访者知情同意书》
      </label>
    </div>
    <div class="nav-row">
      <button class="btn btn-ghost" data-back>← 上一步</button>
      <button class="btn btn-primary" id="submit">确认预约 ➤</button>
    </div>
  </section>

  <!-- Step 4 -->
  <section class="step-box" id="step4">
    <div class="panel">
      <div class="result">
       <div class="res-icon">
  <svg viewBox="0 0 120 120">
    <circle
      cx="60"
      cy="60"
      r="48"
      fill="none"
      stroke="#7BC4A0"
      stroke-width="8"
      stroke-linecap="round"
      stroke-dasharray="302"
      stroke-dashoffset="302">
      <animate
        attributeName="stroke-dashoffset"
        from="302"
        to="0"
        dur=".8s"
        fill="freeze" />
    </circle>

    <polyline
      points="38,62 53,77 84,43"
      fill="none"
      stroke="#7BC4A0"
      stroke-width="9"
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-dasharray="90"
      stroke-dashoffset="90">
      <animate
        attributeName="stroke-dashoffset"
        from="90"
        to="0"
        dur=".45s"
        begin=".75s"
        fill="freeze" />
    </polyline>
  </svg>
</div>
        <div class="res-title">预约成功 · 期待相见</div>
        <div class="res-no" id="resNo">订单号:--</div>
        <div class="res-info" id="resInfo"></div>
        <div style="margin-top:24px">
          <button class="btn btn-ghost" id="restart">再约一次</button>
          <a class="btn btn-primary" href="profile_tsll.html">前往我的主页 →</a>
        </div>
      </div>
    </div>
  </section>

  <!-- 评价弹窗 -->

  /* ===== 评价弹窗功能 ===== */
  function showReviews(cid){
    const c = COUNSELORS.find(x=>x.id===cid);
    const reviews = REVIEWS[cid] || [];
    document.getElementById('modalCounselorName').textContent = c.name;

    const avgStars = reviews.length ? (reviews.reduce((s,r)=>s+r.stars,0)/reviews.length).toFixed(1) : '0.0';
    const starStr = '★★★★★'.slice(0,Math.round(avgStars)) + '☆☆☆☆☆'.slice(0,5-Math.round(avgStars));

    let html = `
      <div class="review-summary">
        <div class="big-rate">${avgStars}</div>
        <div>
          <div class="stars">${starStr}</div>
          <div class="summary-text">基于 ${reviews.length} 条真实评价 · 综合评分</div>
        </div>
      </div>
    `;

    if(reviews.length===0){
      html += '<div style="text-align:center;color:var(--muted);padding:40px">暂无评价</div>';
    }else{
      html += reviews.map(r=>`
        <div class="review-item">
          <div class="review-header">
            <div class="review-avatar">${r.avatar}</div>
            <div class="review-meta">
              <div class="name">${r.name}</div>
              <div class="time">${r.time}</div>
            </div>
            <div class="review-stars">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</div>
          </div>
          <div class="review-tags">${r.tags.map(t=>`<span class="rtag">${t}</span>`).join('')}</div>
          <div class="review-content">${r.content.replace(/(焦虑|抑郁|失眠|情感|家庭|学业|社交|自我成长)/g,'<span class="highlight">$1</span>')}</div>
        </div>
      `).join('');
    }

    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('reviewModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeReviews(){
    document.getElementById('reviewModal').classList.remove('show');
    document.body.style.overflow = '';
  }

  // 点击遮罩关闭
  document.getElementById('reviewModal').addEventListener('click',function(e){
    if(e.target===this) closeReviews();
  });
  // ESC关闭
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape') closeReviews();
  });

  /* 渲染咨询师 */
    /* 主题 -> 标签匹配字典 */
  const TOPIC_MAP = {
    '学业压力':['学业','考试焦虑','焦虑'],
    '人际关系':['人际','社交'],
    '恋爱情感':['情感','自我成长'],
    '家庭矛盾':['家庭','亲子'],
    '就业焦虑':['焦虑','自我成长'],
    '自我探索':['自我成长','情绪'],
    '失眠困扰':['失眠','情绪'],
    '情绪低落':['抑郁','情绪']
  };

  /* 计算推荐：返回 topIds 与每位的命中标签 */
  function getRecommend(){
    if(!selTopics.length) return {topIds:[], hits:{}};
    const wanted = new Set();
    selTopics.forEach(t => (TOPIC_MAP[t]||[]).forEach(x => wanted.add(x)));
    const scored = COUNSELORS.map(c=>{
      const hits = c.tags.filter(t=>wanted.has(t));
      return {id:c.id, score:hits.length, hits};
    }).sort((a,b)=>b.score-a.score);
    if(scored[0].score===0) return {topIds:[], hits:{}};
    const max = scored[0].score;
    const topIds = scored.filter(x=>x.score===max).slice(0,2).map(x=>x.id);
    const hits = {}; scored.forEach(x=>hits[x.id]=x.hits);
    return {topIds, hits};
  }

  /* 渲染推荐区域 */
  function renderRec(){
    const {topIds, hits} = getRecommend();
    const recGrid = document.getElementById('recGrid');
    const recSection = document.getElementById('recSection');

    if(!selTopics.length){
      recSection.style.display = 'none';
      return;
    }
    recSection.style.display = 'block';

    const recCounselors = COUNSELORS.filter(c=>topIds.includes(c.id)).slice(0,3);
    if(recCounselors.length===0){
      recSection.style.display = 'none';
      return;
    }

    recGrid.innerHTML = recCounselors.map((c,idx)=>{
      const hitTags = hits[c.id] || [];
      const reasons = [
        `擅长${hitTags.slice(0,2).join('、')}，与你的需求高度匹配`,
        `${c.years}年从业经验，${c.count}次咨询，口碑优秀`,
        `在${c.tags.slice(0,2).join('、')}领域有丰富经验`
      ];
      return `
      <div class="rec-card" data-id="${c.id}" onclick="selectRec('${c.id}')">
        <div class="rec-badge">${idx===0?'🏆 最佳匹配':'✨ 推荐'}</div>
        <img class="rec-photo" src="../assets/images/${c.photo}" alt="${c.name}" onerror="this.style.display='none';this.parentElement.querySelector('.rec-fallback').style.display='flex'">
        <div class="rec-fallback" style="display:none;width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,${c.color});align-items:center;justify-content:center;font-size:28px;margin-bottom:10px">${c.avatar}</div>
        <div class="rec-name">${c.name}</div>
        <div class="rec-title">${c.title}</div>
        <div class="rec-tags">${c.tags.map(t=>`<span class="tag${hitTags.includes(t)?' match-hit':''}">${t}</span>`).join('')}</div>
        <div class="rec-reason">${reasons[idx%3]}</div>
        <div class="rec-stats">
          <span><b>${c.rate}</b>分</span>
          <span><b>${c.count}</b>次咨询</span>
          <span><b>${c.years}</b>年经验</span>
        </div>
      </div>`;
    }).join('');
  }

  function selectRec(cid){
    selC = cid;
    renderC();
    window.scrollTo({top:document.getElementById('step1').offsetTop-100,behavior:'smooth'});
    toast('已选择 '+COUNSELORS.find(c=>c.id===cid).name,'ok');
  }

  /* 渲染咨询师 */
  function renderC(){
    const {topIds, hits} = getRecommend();
    document.getElementById('cList').innerHTML = COUNSELORS.map(c=>{
      const isRec = topIds.includes(c.id);
      const hitTags = hits[c.id] || [];
      return `
      <div class="c-card${selC===c.id?' sel':''}" data-id="${c.id}">
      ${isRec?'<div class="recommend-badge">✨ 为你推荐</div>':''}
      <div class="c-card-top">             
        <div class="c-photo real-photo" style="background:linear-gradient(135deg,${c.color})">
          <img src="../assets/images/${c.photo}" ...>
          <span class="ph-icon">${c.avatar}</span>
          <span class="ph-text">📷 照片位</span>
        </div>
        <div class="c-info">
          <div class="c-name">${c.name}</div>
          <div class="c-title">${c.title}</div>
          <div class="c-tags">...</div>
        </div>
      </div>                                
      <div class="c-stats">                  
        <span><b>${c.years}年</b>从业</span>
        <span class="rate-clickable" onclick="event.stopPropagation();showReviews('${c.id}')"><b>⭐${c.rate}</b>评价</span>
        <span><b>${c.count}</b>咨询</span>
      </div>
    </div>`;
  }).join('');
    document.querySelectorAll('#cList .c-card').forEach(el=>el.onclick=()=>{
      selC = el.dataset.id; renderC(); renderRec();
    });
  }
  renderC();
  /* 渲染日期 */
  const wkn=['日','一','二','三','四','五','六'];
  const today=new Date(); today.setHours(0,0,0,0);
  const dates=[];
  for(let i=0;i<14;i++){const d=new Date(today.getTime()+i*86400000);dates.push(d);}
  function renderDate(){
    document.getElementById('dateRow').innerHTML = dates.map(d=>{
      const k=fmtDate(d);
      const sel=k===selDate?' sel':'';
      return `<div class="d-card${sel}" data-k="${k}">
        <div class="wk">周${wkn[d.getDay()]}</div>
        <div class="dy">${d.getDate()}</div>
        <div class="mn">${d.getMonth()+1}月</div>
      </div>`;
    }).join('');
    document.querySelectorAll('#dateRow .d-card').forEach(el=>el.onclick=()=>{
      selDate=el.dataset.k; selSlot=null; renderDate(); renderSlots();
    });
  }
  function renderSlots(){
    const allSlots=['09:00-09:50','10:00-10:50','11:00-11:50','14:00-14:50','15:00-15:50','16:00-16:50','19:00-19:50','20:00-20:50'];
    /* 模拟某些已约满 */
    const dis = selDate? [selDate.charCodeAt(8)%4, (selDate.charCodeAt(9)+3)%6] : [];
    document.getElementById('slotGrid').innerHTML = selDate
      ? allSlots.map((s,i)=>{
          const off = dis.includes(i);
          return `<div class="slot${off?' dis':''}${selSlot===s?' sel':''}" data-s="${s}" ${off?'':''}>${s}${off?'<br><small>已约满</small>':''}</div>`;
        }).join('')
      : `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px">请先选择日期</div>`;
    document.querySelectorAll('#slotGrid .slot').forEach(el=>{
      if(el.classList.contains('dis')) return;
      el.onclick=()=>{selSlot=el.dataset.s;renderSlots();}
    });
  }
  renderDate(); renderSlots();

  /* 主题选择 */
  document.getElementById('topicPick').addEventListener('click',e=>{
    if(e.target.tagName!=='SPAN') return;
    e.target.classList.toggle('on');
    selTopics = [...document.querySelectorAll('#topicPick span.on')].map(x=>x.textContent);
    renderC(); renderRec();
  });

  /* 步骤切换 */
  function go(i){
    document.querySelectorAll('.step-box').forEach(b=>b.classList.remove('show'));
    document.getElementById('step'+i).classList.add('show');
    document.querySelectorAll('#stepper .st').forEach(s=>{
      const x=+s.dataset.i;
      s.classList.toggle('on',x===i);
      s.classList.toggle('done',x<i);
    });
    window.scrollTo({top:0,behavior:'smooth'});
  }
  document.getElementById('next1').onclick=()=>{
    if(!selC) return toast('请选择一位咨询师','err');
    go(2);
  };
  document.getElementById('next2').onclick=()=>{
    if(!selDate) return toast('请选择日期','err');
    if(!selSlot) return toast('请选择时间段','err');
    go(3);
    if(u){
      document.getElementById('fName').value = u.username||'';
      document.getElementById('fPhone').value = u.phone||'';
    }
  };
  document.querySelectorAll('[data-back]').forEach(b=>b.onclick=()=>{
    const cur = +document.querySelector('.step-box.show').id.replace('step','');
    go(cur-1);
  });

  /* 提交 */
  document.getElementById('submit').onclick=()=>{
    const n=document.getElementById('fName').value.trim();
    const p=document.getElementById('fPhone').value.trim();
    if(!n) return toast('请填写姓名','err');
    if(!/^1[3-9]\d{9}$/.test(p)) return toast('手机号格式不正确','err');
    if(!selTopics.length) return toast('请选择至少一个咨询主题','err');
    if(!document.getElementById('fAgree').checked) return toast('请同意保密协议','err');

    const c = COUNSELORS.find(x=>x.id===selC);
    const order = {
      no: 'A'+Date.now().toString().slice(-9),
      counselor: c.name, ctitle: c.title, cAv: c.avatar, cColor: c.color,
      date: selDate, slot: selSlot,
      name: n, phone: p,
      way: document.getElementById('fWay').value,
      first: document.getElementById('fFirst').value,
      topics: selTopics.join('、'),
      content: document.getElementById('fContent').value.trim(),
      status: 'pending', createdAt: Date.now()
    };
    /* 存储 */
    const KEY = u? 'sm_apt_'+u.id : 'sm_apt_guest';
    const list = JSON.parse(localStorage.getItem(KEY)||'[]');
    list.unshift(order); localStorage.setItem(KEY,JSON.stringify(list));

    /* 渲染结果 */
    document.getElementById('resNo').textContent='订单号:'+order.no;
    document.getElementById('resInfo').innerHTML=`
      <div class="k">咨询师</div><div class="v">${order.counselor} · ${order.ctitle}</div>
      <div class="k">时间</div><div class="v">${order.date} ${order.slot}</div>
      <div class="k">方式</div><div class="v">${order.way}</div>
      <div class="k">姓名</div><div class="v">${order.name}</div>
      <div class="k">电话</div><div class="v">${order.phone}</div>
      <div class="k">主题</div><div class="v">${order.topics}</div>
    `;
    go(4);
    renderMy();
    if(typeof logActivity==='function') logActivity('appointment',{counselor:c.name});
    toast('预约成功','ok');
  };

  document.getElementById('restart').onclick=()=>{
    selC=null;selDate=null;selSlot=null;selTopics=[];
    document.querySelectorAll('#topicPick span').forEach(s=>s.classList.remove('on'));
    document.getElementById('fContent').value='';
    renderC();renderDate();renderSlots();
    go(1);
  };

  /* 我的预约 */
  function renderMy(){
    const KEY = u? 'sm_apt_'+u.id : 'sm_apt_guest';
    const list = JSON.parse(localStorage.getItem(KEY)||'[]');
    const wrap = document.getElementById('myApt');
    if(!list.length){
      wrap.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px">暂无预约记录</div>';
      return;
    }
    wrap.innerHTML = list.slice(0,5).map(a=>`
      <div class="item">
        <div class="av">${a.cAv}</div>
        <div class="info">
          <b>${a.counselor} · ${a.way}</b>
          <small>${a.date} ${a.slot} · 订单号 ${a.no}</small>
        </div>
        <div>
          <span class="badge-st st-${a.status==='pending'?'pending':a.status==='done'?'done':'cancel'}">${a.status==='pending'?'待咨询':a.status==='done'?'已完成':'已取消'}</span>
          ${a.status==='pending'?`<a href="javascript:;" data-no="${a.no}" class="cancel" style="margin-left:10px;color:var(--err);font-size:12px">取消</a>`:''}
        </div>
      </div>`).join('');
    wrap.querySelectorAll('.cancel').forEach(b=>b.onclick=()=>{
      if(!confirm('确认取消该预约?')) return;
      const arr = JSON.parse(localStorage.getItem(KEY)||'[]');
      const it = arr.find(x=>x.no===b.dataset.no); it.status='cancel';
      localStorage.setItem(KEY,JSON.stringify(arr));
      renderMy(); toast('已取消','ok');
    });
  }
  renderMy();
</script>
</body>
</html>
