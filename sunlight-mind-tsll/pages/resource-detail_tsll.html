       {title:'第一夜：我们的不幸是谁的错？',content:`<p>"心理创伤"并不存在。决定我们自身的不是过去的经历，而是我们自己赋予经历的意义。</p><p>阿德勒否定了弗洛伊德的原因论，他主张"目的论"——我们现在的行为，都是为了某个目的而选择的。</p><p>青年质问哲人：那些遭受过虐待的孩子，难道也是自己选择痛苦的吗？哲人回答：他们之所以"无法"走出来，是因为他们"不愿"走出来。这不是责备，而是力量的所在——既然是自己选择的，就一定能选择改变。</p><p>愤怒，是一种"捏造出来的情绪"。当母亲在电话响起时立刻收起怒容，温和地接听——这就证明，愤怒是她随时可以收放的工具。</p><p>"重要的不是被给予了什么，而是如何利用被给予的东西。"</p>`},

      <div class="book-info">
        <h2>${r.title}</h2>
        <div class="author">作者：${r.author}</div>
        <div class="book-tags">${r.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <p style="font-size:13px;color:#555;line-height:1.7">${r.desc}</p>
        <div class="progress-row">
          <span style="font-size:12px;color:var(--muted)">阅读进度</span>
          <div class="progress-bar"><i id="bookProg"></i></div>
          <span id="bookProgTxt" style="font-size:12px;color:var(--accent);font-weight:600">0%</span>
        </div>
      </div>
    </div>

    <div class="r-meta">
      <h1 class="r-title">📖 ${r.chapters[0].title.split('：')[0]} · ${r.title}</h1>
      <div class="r-stats"><span>👁 ${r.views} 阅读</span><span>🏷 ${r.cat}</span><span>📄 ${r.duration}</span></div>
      <div class="r-actions">
        <button class="act-btn" id="likeBtn">❤ 喜欢 <span id="likeNum">256</span></button>
        <button class="act-btn" id="favBtn">⭐ 加入书架</button>
        <button class="act-btn" onclick="toast('链接已复制','ok')">🔗 分享</button>
        <button class="act-btn" onclick="toast('已开始下载','ok')">⤓ 下载</button>
      </div>
    </div>

    <div class="panel" style="margin-bottom:18px">
      <h3 style="font-size:16px;margin-bottom:8px">📚 目录</h3>
      <ul class="toc" id="toc"></ul>
    </div>

    <div class="reader" id="reader"></div>
  `;

  const toc = document.getElementById('toc');
  const reader = document.getElementById('reader');

  function paint(){
    toc.innerHTML = r.chapters.map((c,i)=>`<li class="${i===curChap?'active':''}" data-i="${i}">${i+1}. ${c.title}<small>${i<curChap?'已读':i===curChap?'阅读中':''}</small></li>`).join('');
    reader.innerHTML = `
      <h3>${r.chapters[curChap].title}</h3>
      ${r.chapters[curChap].content}
      <div class="chap-nav">
        <button id="prevChap" ${curChap===0?'disabled':''}>← 上一章</button>
        <span style="font-size:12px;color:var(--muted)">${curChap+1} / ${total}</span>
        <button id="nextChap" ${curChap===total-1?'disabled':''}>下一章 →</button>
      </div>
    `;
    const pct = Math.round((curChap+1)/total*100);
    document.getElementById('bookProg').style.width = pct+'%';
    document.getElementById('bookProgTxt').textContent = pct+'%';
    localStorage.setItem('sm_book_chap_'+id, curChap);

    document.getElementById('prevChap')?.addEventListener('click',()=>{ if(curChap>0){curChap--;paint();window.scrollTo({top:reader.offsetTop-80,behavior:'smooth'});} });
    document.getElementById('nextChap')?.addEventListener('click',()=>{ if(curChap<total-1){curChap++;paint();window.scrollTo({top:reader.offsetTop-80,behavior:'smooth'});toast('已切换到下一章','ok');} });
    toc.querySelectorAll('li').forEach(li=>li.addEventListener('click',()=>{curChap=+li.dataset.i;paint();window.scrollTo({top:reader.offsetTop-80,behavior:'smooth'});}));
  }
  paint();
  setupLikeFav();
}

function renderAudio(r){
  const main = document.getElementById('mainArea');
  // 解析时长 60:00 -> 3600s
  const [mm,ss] = r.duration.split(':').map(Number);
  const totalSec = mm*60 + (ss||0);
  main.innerHTML = `
    <div class="audio-hero" style="background:${r.cover}">
      <div class="audio-cover-big" id="audioCover"><img src="../assets/images/${r.img}" alt="${r.title}封面" onload="this.parentElement.classList.add('has-real')" onerror="this.style.display='none'"><span class="img-fallback">${r.ic}</span></div>
      <h2>${r.title}</h2>
      <p>${r.cat} · ${r.duration}</p>
    </div>

    <div class="player-bar">
      <div class="time-row"><span id="curTime">0:00</span><span>${r.duration}</span></div>
      <div class="seek-bar" id="seekBar"><i id="seekFill"></i></div>
      <div class="player-ctrl">
        <button class="ctrl-btn" onclick="toast('上一首','ok')">⏮</button>
        <button class="ctrl-btn play" id="playBtn">▶</button>
        <button class="ctrl-btn" onclick="toast('下一首','ok')">⏭</button>
      </div>
    </div>

    <div class="r-meta">
      <h1 class="r-title">🎧 ${r.title}</h1>
      <div class="r-stats"><span>👁 ${r.views} 收听</span><span>🏷 ${r.cat}</span><span>⏱ ${r.duration}</span></div>
      <div class="r-actions">
        <button class="act-btn" id="likeBtn">❤ 喜欢 <span id="likeNum">98</span></button>
        <button class="act-btn" id="favBtn">⭐ 收藏</button>
        <button class="act-btn" onclick="toast('链接已复制','ok')">🔗 分享</button>
        <button class="act-btn" onclick="toast('已加入下载列表','ok')">⤓ 下载</button>
      </div>

      <div class="panel">
        <h3 style="font-size:16px;margin-bottom:10px">📝 简介</h3>
        <p style="line-height:1.8">${r.desc}</p>
      </div>

      <div class="panel">
        <h3 style="font-size:16px;margin-bottom:10px">📜 同步引导</h3>
        <div class="lyric-box" id="lyricBox">
          ${r.lyrics.map((l,i)=>`<div class="lyric-line ${i===0?'active':''}" data-t="${l.t}">${l.text}</div>`).join('')}
        </div>
      </div>
    </div>
  `;

  let playing=false, cur=0, timer=null;
  const playBtn = document.getElementById('playBtn');
  const cover = document.getElementById('audioCover');
  const fill = document.getElementById('seekFill');
  const curTimeEl = document.getElementById('curTime');
  const lines = document.querySelectorAll('.lyric-line');

  function fmt(s){ const m=Math.floor(s/60); const x=Math.floor(s%60); return m+':'+(x<10?'0':'')+x; }
  function tick(){
    cur++;
    if(cur>=totalSec){ cur=0; pause(); toast('🎵 播放完毕','ok'); }
    fill.style.width = (cur/totalSec*100)+'%';
    curTimeEl.textContent = fmt(cur);
    // 同步歌词
    let active = 0;
    r.lyrics.forEach((l,i)=>{ if(cur>=l.t) active=i; });
    lines.forEach((el,i)=>el.classList.toggle('active', i===active));
  }
  function play(){ playing=true; playBtn.textContent='⏸'; cover.classList.add('playing'); timer=setInterval(tick,1000); }
  function pause(){ playing=false; playBtn.textContent='▶'; cover.classList.remove('playing'); clearInterval(timer); }
  playBtn.addEventListener('click',()=>{ playing?pause():play(); });
  document.getElementById('seekBar').addEventListener('click',e=>{
    const rect = e.currentTarget.getBoundingClientRect();
    cur = Math.floor((e.clientX-rect.left)/rect.width*totalSec);
    fill.style.width = (cur/totalSec*100)+'%';
    curTimeEl.textContent = fmt(cur);
  });
  setupLikeFav();
}

function setupLikeFav(){
  const lb = document.getElementById('likeBtn');
  const fb = document.getElementById('favBtn');
  if(!lb) return;
  let liked=false, n=parseInt(lb.querySelector('#likeNum').textContent)||0;
  lb.addEventListener('click',()=>{
    liked=!liked; n+=liked?1:-1;
    lb.classList.toggle('liked',liked);
    lb.querySelector('#likeNum').textContent = n;
  });
  let faved=false;
  fb.addEventListener('click',()=>{
    faved=!faved;
    fb.classList.toggle('faved',faved);

  });
}

  const KEY = 'sm_comments_r'+id;
  const def = [
    {name:'小阳光',avatar:'☀️',text: type==='book'?'读到第三章哭了，原来不是只有我一个人这样想。':type==='audio'?'每天通勤路上都听一遍，真的很治愈。':'写得好真诚，转给我那个老说不出"不"的朋友了。',time:'2 小时前'},
    {name:'薄荷糖',avatar:'🌿',text: type==='book'?'已经在书架上躺了半年，今天终于翻开。':type==='audio'?'10 分钟，但效果像睡了一小时。':'"用我开头，不要用你开头"——记住了！',time:'5 小时前'},
    {name:'晴友',avatar:'🌸',text:'谢谢晴心整理这些资源，真的帮了大忙。',time:'昨天'}
  ];
  function paint(){
    const local = JSON.parse(localStorage.getItem(KEY)||'[]');
    const all = local.concat(def);
    document.getElementById('cCount').textContent = '('+all.length+')';
    document.getElementById('cList').innerHTML = all.map(c=>`
      <li class="comment-item">
        <div class="c-avatar">${c.avatar}</div>
        <div class="c-body"><div class="c-name">${c.name}</div><div class="c-text">${c.text}</div><div class="c-time">${c.time}</div></div>
      </li>`).join('');
  }
  paint();
  document.getElementById('cSubmit').addEventListener('click',()=>{
    const t = document.getElementById('cInput').value.trim();
    if(!t) return toast('请输入评论','err');
    const u = JSON.parse(localStorage.getItem('sm_currentUser')||'null');
    if(!u) return toast('请先登录','err');
    const list = JSON.parse(localStorage.getItem(KEY)||'[]');
    list.unshift({name:u.username,avatar:u.avatar||'🙂',text:t,time:'刚刚'});
    localStorage.setItem(KEY,JSON.stringify(list));
    document.getElementById('cInput').value='';
    toast('💬 评论已发送','ok'); paint();
  });
}
</script>
</body>
</html>
