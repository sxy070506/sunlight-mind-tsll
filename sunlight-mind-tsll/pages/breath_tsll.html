<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸训练 · 晴心</title>
<link rel="stylesheet" href="../assets/css/site_tsll.css">
<style>
.breath-stage{
  position:relative;min-height:560px;border-radius:24px;overflow:hidden;
  background:
    linear-gradient(rgba(166,216,231,.18),rgba(123,196,160,.18)),
    url('../assets/images/breath-bg.jpg') center/cover no-repeat,
    radial-gradient(ellipse at 30% 30%, rgba(166,216,231,.6), transparent 60%),
    linear-gradient(180deg, #A6D8E7 0%, #7BC4A0 50%, #FFE4B5 100%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
}
.breath-stage::before,.breath-stage::after{
  content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.5);filter:blur(50px)
}
.breath-stage::before{width:240px;height:240px;top:8%;right:12%;animation:float 8s ease-in-out infinite}
.breath-stage::after{width:180px;height:180px;bottom:10%;left:10%;animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-30px) scale(1.1)}}

.circle-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;color:#fff}
.b-circle{
  width:280px;height:280px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(255,255,255,.4) 60%,transparent 80%);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  box-shadow:0 0 80px rgba(255,255,255,.6);
  transition:transform 4s cubic-bezier(.4,0,.6,1);
  transform:scale(.6);
}
.b-circle.inhale{transform:scale(1.1)}
.b-circle.hold{transform:scale(1.1)}
.b-circle.exhale{transform:scale(.6)}
.b-action{font-size:36px;font-weight:800;color:var(--ink);margin-bottom:6px}
.b-count{font-size:80px;font-weight:900;color:var(--accent);line-height:1}
.b-status{margin-top:24px;font-size:14px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.2)}

.controls{display:flex;justify-content:center;gap:14px;margin-top:30px}
.mode-bar{display:flex;justify-content:center;gap:10px;margin:24px 0;flex-wrap:wrap}
.mode-btn{padding:10px 20px;border:2px solid var(--rule);border-radius:999px;background:#fff;cursor:pointer;font-size:14px;color:var(--muted);font-weight:600}
.mode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 6px 16px rgba(245,166,35,.3)}

.session-info{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
.si-card{background:#fff;border-radius:14px;padding:18px;text-align:center;box-shadow:var(--shadow)}
.si-num{font-size:28px;font-weight:900;color:var(--accent)}
.si-l{font-size:12px;color:var(--muted);margin-top:4px}
/* 训练历史 */
.history-panel{margin-top:24px}
.history-list{display:grid;gap:10px}
.history-item{background:#fff;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:.25s}
.history-item:hover{transform:translateX(4px)}
.history-item .h-icon{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#A6D8E7,#7BC4A0);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff}
.history-item .h-body{flex:1}
.history-item .h-title{font-size:14px;font-weight:700}
.history-item .h-meta{font-size:12px;color:var(--muted);margin-top:2px}
.history-item .h-time{font-size:12px;color:var(--muted)}
.empty-history{text-align:center;padding:30px;color:var(--muted)}
</style>
</head>
<body>

<main class="wrap">
  <div class="page-hero">
    <h1>🌬️ 呼吸训练</h1>
    <p>跟着光球的呼吸节奏，让自己慢下来。</p>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="478">4-7-8 呼吸法</button>
    <button class="mode-btn" data-mode="box">箱式呼吸</button>
    <button class="mode-btn" data-mode="deep">深呼吸</button>
  </div>

  <div class="breath-stage">
    <div class="circle-wrap">
      <div class="b-circle" id="circle">
        <div class="b-action" id="bAction">准备</div>
        <div class="b-count" id="bCount">3</div>
      </div>
      <div class="b-status" id="bStatus">点击开始，跟着光球呼吸</div>
    </div>
  </div>

  <div class="controls">
  <button class="btn btn-primary" id="startBtn">▶ 开始训练</button>
  <button class="btn btn-ghost" id="pauseBtn" disabled>⏸ 暂停</button>
  <button class="btn btn-danger" id="endBtn" disabled>■ 结束训练</button>
    <button class="btn btn-ghost" id="soundBtn">🔊 白噪音</button>
    <button class="btn btn-ghost" id="voiceBtn">🗣️ 语音引导</button></div>

  <div class="session-info">
    <div class="si-card"><div class="si-num" id="cycleN">0</div><div class="si-l">已完成轮次</div></div>
    <div class="si-card"><div class="si-num" id="totalT">0:00</div><div class="si-l">本次时长</div></div>
    <div class="si-card"><div class="si-num" id="lifeT">0</div><div class="si-l">总训练分钟</div></div>
  </div>

  <div class="panel" style="margin-top:24px">
    <h3 style="font-size:18px;margin-bottom:14px">📚 呼吸法说明</h3>
    <p style="line-height:1.8;color:var(--ink)" id="modeDesc">
      <strong>4-7-8 呼吸法</strong>由 Andrew Weil 博士推广，通过 4 秒吸气、7 秒屏息、8 秒呼气的节奏，激活副交感神经，快速进入平静状态。睡前 3-5 轮可帮助入睡。
    </p>
  </div>
    <!-- 训练历史 -->
  <div class="panel history-panel">
    <div class="panel-head"><h3>📜 训练记录</h3><span class="more" style="cursor:pointer" onclick="clearHistory()">清空记录</span></div>
    <div class="history-list" id="historyList"></div>
  </div>
</main>

<script src="../assets/js/site_tsll.js"></script>
<script>
injectTopbar('breath');
injectContactBar();

const MODES = {
  '478':{name:'4-7-8 呼吸',pattern:[['吸气',4],['屏息',7],['呼气',8]], desc:'<strong>4-7-8 呼吸法</strong>由 Andrew Weil 博士推广，通过 4 秒吸气、7 秒屏息、8 秒呼气的节奏，激活副交感神经，快速进入平静状态。睡前 3-5 轮可帮助入睡。'},
  'box':{name:'箱式呼吸',pattern:[['吸气',4],['屏息',4],['呼气',4],['屏息',4]], desc:'<strong>箱式呼吸</strong>由海豹突击队使用，4 秒吸-4 秒持-4 秒呼-4 秒持，能快速恢复专注力。'},
  'deep':{name:'深呼吸',pattern:[['吸气',5],['呼气',5]], desc:'<strong>深呼吸</strong>是最简单也是最有效的减压方式：5 秒缓慢吸气，5 秒缓慢呼气。'}
};

let curMode='478', running=false, paused=false, cycle=0, startTs=0, totalSec=0, timer=null, audioEl=null, soundOn=false, voiceOn=false;
const $ = id => document.getElementById(id);
$('lifeT').textContent = +(localStorage.getItem('sm_breathMin')||0);

document.querySelectorAll('.mode-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    curMode = b.dataset.mode;
    $('modeDesc').innerHTML = MODES[curMode].desc;
  });
});

/* 语音引导 */
function speak(text){
  if(!voiceOn || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='zh-CN'; u.rate=.85; u.pitch=1; u.volume=.9;
  speechSynthesis.speak(u);
}

$('voiceBtn').addEventListener('click', ()=>{
  voiceOn = !voiceOn;
  $('voiceBtn').textContent = voiceOn ? '🔇 关闭语音' : '🗣️ 语音引导';
  if(!voiceOn) speechSynthesis.cancel();
});

$('startBtn').addEventListener('click', async ()=>{
  if(running) return;

  running = true;
  paused = false;
  cycle = 0;
  totalSec = 0;
  $('cycleN').textContent = 0;
  $('totalT').textContent = '0:00';

  $('startBtn').disabled = true;
  $('pauseBtn').disabled = true;
  $('endBtn').disabled = false;

  // 开始前 3 秒准备倒计时
  await readyCountdown();

  // 如果准备期间点了结束，就不进入正式训练
  if(!running) return;

  $('pauseBtn').disabled = false;
  startTs = Date.now();

  timer = setInterval(()=>{
    if(!paused){
      totalSec = Math.floor((Date.now()-startTs)/1000);
      $('totalT').textContent = `${Math.floor(totalSec/60)}:${String(totalSec%60).padStart(2,'0')}`;
    }
  },1000);

  runCycle();
});

$('pauseBtn').addEventListener('click', togglePause);

async function readyCountdown(){
  $('bAction').textContent = '准备开始';
  $('circle').className = 'b-circle';
  $('circle').style.transitionDuration = '.3s';
  $('bStatus').textContent = '调整坐姿，放松肩膀，准备开始';

  for(let i=3; i>=1; i--){
    if(!running) return;
    $('bCount').textContent = i;
    await new Promise(r=>setTimeout(r,1000));
  }

  $('bAction').textContent = '开始';
  $('bCount').textContent = 'GO';
  await new Promise(r=>setTimeout(r,500));
}

async function runCycle(){
  while(running){
    cycle++;
    $('cycleN').textContent = cycle;

    for(const [act, sec] of MODES[curMode].pattern){
      if(!running) return;

      $('bAction').textContent = act;
      speak(act);
      $('circle').className = 'b-circle ' + (act==='吸气' ? 'inhale' : act==='呼气' ? 'exhale' : 'hold');
      $('circle').style.transitionDuration = sec + 's';
      $('bStatus').textContent = `第 ${cycle} 轮 · ${MODES[curMode].name}`;

      for(let i=sec; i>=1; i--){
        if(!running) return;

        // 暂停时卡在当前秒数，不继续往下走
        while(paused && running){
          await new Promise(r=>setTimeout(r,200));
        }

        $('bCount').textContent = i;
        await new Promise(r=>setTimeout(r,1000));
      }
    }
  }
}

function togglePause(){
  if(!running) return;

  paused = !paused;

  if(paused){
    $('pauseBtn').textContent = '▶ 继续';
    $('bAction').textContent = '已暂停';
    $('bCount').textContent = '⏸';
    $('bStatus').textContent = '训练已暂停，点击继续恢复';
    $('circle').className = 'b-circle';
  }else{
    $('pauseBtn').textContent = '⏸ 暂停';
    $('bStatus').textContent = '继续跟随节奏呼吸';
    // 重新校准计时起点，避免暂停时间被算进去
    startTs = Date.now() - totalSec * 1000;
  }
}

function endTraining(){
  running = false;
  paused = false;
  clearInterval(timer);

  $('startBtn').disabled = false;
  $('pauseBtn').disabled = true;
  $('endBtn').disabled = true;
  $('pauseBtn').textContent = '⏸ 暂停';

  $('bAction').textContent = '已结束';
  $('bCount').textContent = '✓';
  $('bStatus').textContent = '本次训练已结束';
  $('circle').className = 'b-circle';

  const min = Math.floor(totalSec / 60);

  if(min > 0){
    const lifeMin = +(localStorage.getItem('sm_breathMin') || 0) + min;
    localStorage.setItem('sm_breathMin', lifeMin);
    $('lifeT').textContent = lifeMin;

    // 保存训练记录
    saveHistory({
      mode: MODES[curMode].name,
      minutes: min,
      cycles: cycle,
      date: new Date().toLocaleString('zh-CN')
    });

    logActivity('呼吸训练', {
      minutes: min,
      mode: curMode,
      cycles: cycle
    });

    toast('🌿 训练完成 · ' + min + ' 分钟', 'ok');
  }else{
    toast('训练时间不足 1 分钟，未计入总时长', 'err');
  }
  
  renderHistory();
}

/* 保存训练记录 */
function saveHistory(record){
  const key = 'sm_breathHistory';
  const list = JSON.parse(localStorage.getItem(key) || '[]');
  list.unshift(record);
  if(list.length > 20) list.pop(); // 只保留最近20条
  localStorage.setItem(key, JSON.stringify(list));
}

/* 渲染训练记录 */
function renderHistory(){
  const list = JSON.parse(localStorage.getItem('sm_breathHistory') || '[]');
  const wrap = $('historyList');
  if(!list.length){
    wrap.innerHTML = '<div class="empty-history">还没有训练记录，开始第一次呼吸训练吧 🌱</div>';
    return;
  }
  wrap.innerHTML = list.map(h=>`
    <div class="history-item">
      <div class="h-icon">🌬️</div>
      <div class="h-body">
        <div class="h-title">${h.mode} · ${h.minutes}分钟 · ${h.cycles}轮</div>
        <div class="h-meta">${h.date}</div>
      </div>
    </div>
  `).join('');
}

/* 清空记录 */
function clearHistory(){
  if(!confirm('确定清空所有训练记录吗？')) return;
  localStorage.removeItem('sm_breathHistory');
  renderHistory();
  toast('记录已清空','ok');
}

$('endBtn').addEventListener('click', endTraining);

$('soundBtn').addEventListener('click',()=>{
  if(!audioEl){
    // 生成白噪音（无外部资源）
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const buf = ctx.createBuffer(1, ctx.sampleRate*2, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++) data[i] = (Math.random()*2-1)*.15;
    const src = ctx.createBufferSource(); src.buffer=buf; src.loop=true;
    const gain = ctx.createGain(); gain.gain.value=.3;
    src.connect(gain).connect(ctx.destination); src.start();
    audioEl = {ctx,gain,src};
    soundOn=true; $('soundBtn').textContent='🔇 关闭白噪音';
  } else {
    if(soundOn){ audioEl.gain.gain.value=0; soundOn=false; $('soundBtn').textContent='🔊 白噪音'; }
    else { audioEl.gain.gain.value=.3; soundOn=true; $('soundBtn').textContent='🔇 关闭白噪音'; }
  }
});

// 初始化
renderHistory();
</script>
</body>
</html>
