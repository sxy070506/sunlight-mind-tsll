<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找回密码 · 晴心 SunlightMind</title>
<style>
:root{--bg:#FFFCF5;--bg2:#FFF5E1;--ink:#4A3F35;--muted:#9C8B7A;--rule:#F0E5D2;--accent:#F5A623;--err:#E07A5F;--ok:#7BC4A0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC",sans-serif;background:linear-gradient(135deg,#FFE4B5,#FFB7B2 50%,#A6D8E7);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:var(--ink)}
.card{width:100%;max-width:480px;background:#fff;border-radius:24px;padding:50px 40px;box-shadow:0 30px 80px rgba(0,0,0,.12)}
.back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;margin-bottom:20px}
h1{font-size:28px;font-weight:800;margin-bottom:8px}
.sub{color:var(--muted);font-size:14px;margin-bottom:30px}

/* Stepper */
.steps{display:flex;align-items:center;margin-bottom:30px}
.step{flex:1;text-align:center;font-size:12px;color:var(--muted);position:relative}
.step .dot{width:32px;height:32px;border-radius:50%;background:var(--rule);color:#fff;display:flex;align-items:center;justify-content:center;margin:0 auto 6px;font-weight:700;transition:.3s}
.step.active .dot{background:var(--accent);box-shadow:0 0 0 6px rgba(245,166,35,.2)}
.step.done .dot{background:var(--ok)}
.step.active{color:var(--ink);font-weight:600}
.line{flex:.5;height:2px;background:var(--rule);margin:0 -10px;margin-top:-26px;align-self:flex-start}
.line.done{background:var(--ok)}

.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:8px}
.field-row{display:flex;gap:10px;position:relative}
.input{flex:1;height:48px;padding:0 16px;border:2px solid var(--rule);border-radius:12px;font-size:15px;outline:none;transition:.25s}
.input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(245,166,35,.15)}
.tip{font-size:12px;margin-top:6px;min-height:14px}
.tip.err{color:var(--err)}.tip.ok{color:var(--ok)}
.code-btn{height:48px;padding:0 18px;border:2px solid var(--accent);background:transparent;color:var(--accent);border-radius:12px;font-weight:600;cursor:pointer;font-size:14px}
.code-btn:disabled{opacity:.5;cursor:not-allowed;border-color:var(--muted);color:var(--muted)}
.btn-submit{width:100%;height:50px;border:none;border-radius:12px;font-size:16px;font-weight:700;background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff;cursor:pointer;box-shadow:0 8px 20px rgba(245,166,35,.4);margin-top:16px}
.btn-submit:hover{transform:translateY(-2px)}

.success-icon{width:80px;height:80px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:42px;margin:20px auto}

.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-200%);background:var(--ink);color:#fff;padding:12px 24px;border-radius:8px;z-index:99;font-size:14px;transition:.35s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{background:var(--ok)}.toast.err{background:var(--err)}
.hide{display:none}
</style>
</head>
<body>

<div class="card">
  <a class="back" href="login_tsll.html">← 返回登录</a>
  <h1>找回密码</h1>
  <p class="sub">通过手机验证码重置你的密码</p>

  <div class="steps">
    <div class="step active" id="s1"><div class="dot">1</div>验证手机</div>
    <div class="line" id="l1"></div>
    <div class="step" id="s2"><div class="dot">2</div>设置密码</div>
    <div class="line" id="l2"></div>
    <div class="step" id="s3"><div class="dot">3</div>完成</div>
  </div>

  <!-- Step 1 -->
  <div id="step1">
    <div class="field">
      <label>手机号</label>
      <div class="field-row"><input class="input" id="phone" placeholder="11 位手机号" maxlength="11"></div>
      <div class="tip" id="tip-phone"></div>
    </div>
    <div class="field">
      <label>验证码</label>
      <div class="field-row">
        <input class="input" id="code" placeholder="6 位验证码" maxlength="6" style="flex:1">
        <button class="code-btn" type="button" id="getCode">获取验证码</button>
      </div>
      <div class="tip" id="tip-code"></div>
    </div>
    <button class="btn-submit" id="btn1">下一步</button>
  </div>

  <!-- Step 2 -->
  <div id="step2" class="hide">
    <div class="field">
      <label>新密码</label>
      <input class="input" type="password" id="newpwd" placeholder="8-16 位，含字母与数字" maxlength="16">
      <div class="tip" id="tip-newpwd"></div>
    </div>
    <div class="field">
      <label>确认新密码</label>
      <input class="input" type="password" id="newpwd2" placeholder="再次输入新密码" maxlength="16">
      <div class="tip" id="tip-newpwd2"></div>
    </div>
    <button class="btn-submit" id="btn2">重置密码</button>
  </div>

  <!-- Step 3 -->
  <div id="step3" class="hide" style="text-align:center">
    <div class="success-icon">✓</div>
    <h2 style="font-size:22px;margin-bottom:10px">密码重置成功</h2>
    <p style="color:var(--muted);margin-bottom:20px">请使用新密码重新登录</p>
    <a class="btn-submit" href="login_tsll.html" style="display:flex;align-items:center;justify-content:center;text-decoration:none">立即登录</a>
  </div>

<div style="margin-top:20px;text-align:center;font-size:13px;color:var(--muted)">📞 心理援助：校心理咨询中心 <b style="color:var(--accent)">0571-8820-1234</b> · 全国希望热线 <b style="color:var(--accent)">400-161-9995</b></div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = id => document.getElementById(id);
const toast = (msg, type='') => { const t=$('toast'); t.textContent=msg; t.className='toast show '+type; setTimeout(()=>t.className='toast '+type,2200); };
const REG = {phone:/^1[3-9]\d{9}$/, code:/^\d{6}$/, pwd:/^(?=.*[a-zA-Z])(?=.*\d)[a-zA-Z\d_!@#$%^&*]{8,16}$/};
let currentPhone = '';

let timer=null;
$('getCode').addEventListener('click',()=>{
  const p = $('phone').value.trim();
  if(!REG.phone.test(p)) return toast('请检查手机号','err');
  const users = JSON.parse(localStorage.getItem('sm_users')||'[]');
  if(!users.some(u=>u.phone===p)) return toast('该手机号未注册','err');
  const code = String(Math.floor(100000+Math.random()*900000));
  sessionStorage.setItem('sm_reset_'+p, code);
  toast('📩 验证码：'+code+'（演示）','ok');
  let s=60; const btn=$('getCode'); btn.disabled=true; btn.textContent=`${s}s`;
  timer=setInterval(()=>{ s--; if(s<=0){clearInterval(timer);btn.disabled=false;btn.textContent='获取验证码'}else btn.textContent=`${s}s`; },1000);
});

$('btn1').addEventListener('click',()=>{
  const p=$('phone').value.trim(), c=$('code').value.trim();
  if(!REG.phone.test(p)) return toast('请检查手机号','err');
  if(!REG.code.test(c)) return toast('请输入 6 位验证码','err');
  if(sessionStorage.getItem('sm_reset_'+p)!==c) return toast('验证码错误或已过期','err');
  currentPhone = p;
  $('step1').classList.add('hide');
  $('step2').classList.remove('hide');
  $('s1').className='step done';$('s1').querySelector('.dot').textContent='✓';
  $('l1').className='line done';
  $('s2').className='step active';
});

$('btn2').addEventListener('click',()=>{
  const p1=$('newpwd').value, p2=$('newpwd2').value;
  if(!REG.pwd.test(p1)) return toast('密码需 8-16 位含字母与数字','err');
  if(p1!==p2) return toast('两次密码不一致','err');
  const users=JSON.parse(localStorage.getItem('sm_users')||'[]');
  const u=users.find(x=>x.phone===currentPhone);
  if(u){u.password=p1; localStorage.setItem('sm_users',JSON.stringify(users));}
  $('step2').classList.add('hide');
  $('step3').classList.remove('hide');
  $('s2').className='step done';$('s2').querySelector('.dot').textContent='✓';
  $('l2').className='line done';
  $('s3').className='step active';
});
</script>
</body>
</html>
