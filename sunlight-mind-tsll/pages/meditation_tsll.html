<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冥想空间 · 晴心</title>
<link rel="stylesheet" href="../assets/css/site_tsll.css">
<style>
.med-grid{display:grid;grid-template-columns:1fr 1.6fr;gap:20px}
.theme-list{list-style:none}
.theme-item{padding:14px;border-radius:12px;background:var(--bg2);margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:.2s;border:2px solid transparent}
.theme-item:hover{transform:translateX(4px)}
.theme-item.active{background:linear-gradient(135deg,#FFE4B5,#FFB7B2);color:var(--ink);border-color:var(--accent)}
.t-ic{font-size:30px}
.t-body h5{font-weight:700;font-size:14px;margin-bottom:2px}
.t-body small{color:var(--muted);font-size:11px}
.t-body{flex:1}

.med-stage{
  position:relative;min-height:540px;border-radius:20px;overflow:hidden;
  background:
    linear-gradient(rgba(26,20,50,.35),rgba(26,20,50,.45)),
    url('../assets/images/meditation-bg.jpg') center/cover no-repeat,
    radial-gradient(ellipse at center, #4A3F8A 0%, #2C2452 70%, #1A1432 100%);
  display:flex;align-items:center;justify-content:center;color:#fff;
}
.stars{position:absolute;inset:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 3s infinite}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:1}}
.lotus{
  position:relative;z-index:2;text-align:center;
}
.lotus .ic{font-size:120px;line-height:1;animation:rise 5s ease-in-out infinite}
@keyframes rise{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.timer-display{font-size:80px;font-weight:300;font-variant-numeric:tabular-nums;letter-spacing:4px;margin-top:14px}
.med-quote{font-size:14px;opacity:.85;margin-top:14px;max-width:480px;line-height:1.8}
.duration-bar{display:flex;justify-content:center;gap:10px;margin:20px 0;flex-wrap:wrap}
.dur-btn{padding:8px 18px;border:2px solid var(--rule);border-radius:999px;background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--muted)}
.dur-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.controls{display:flex;justify-content:center;gap:14px}

@media (max-width:900px){.med-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<main class="wrap">
  <div class="page-hero">
    <h1>🧘 冥想空间</h1>
    <p>给自己一段安静的时光，把心放慢一点点。</p>
  </div>

  <div class="med-grid">
    <!-- 主题列表 -->
    <div class="panel">
      <h3 style="font-size:16px;margin-bottom:14px">🌌 选择主题</h3>
      <ul class="theme-list" id="themeList"></ul>
    </div>

    <!-- 冥想台 -->
    <div>
      <div class="med-stage" id="stage">
        <div class="stars" id="starField"></div>
        <div class="lotus">
          <div class="ic" id="medIcon">🧘</div>
          <div class="timer-display" id="timer">05:00</div>
          <div class="med-quote" id="quote">深呼吸，让心慢下来</div>
        </div>
      </div>

      <div class="duration-bar">
        <button class="dur-btn" data-min="3">3 分钟</button>
        <button class="dur-btn active" data-min="5">5 分钟</button>
        <button class="dur-btn" data-min="10">10 分钟</button>
        <button class="dur-btn" data-min="15">15 分钟</button>
        <button class="dur-btn" data-min="20">20 分钟</button>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="startBtn">▶ 开始冥想</button>
        <button class="btn btn-ghost" id="resetBtn">↻ 重置</button>
      </div>
    </div>
  </div>
</main>

<script src="../assets/js/site_tsll.js"></script>
<script>
injectTopbar('meditation');
injectContactBar();

// 星空
const sf = document.getElementById('starField');
for(let i=0;i<60;i++){
  const s=document.createElement('div'); s.className='star';
  s.style.top=Math.random()*100+'%'; s.style.left=Math.random()*100+'%';
  s.style.animationDelay=Math.random()*3+'s';
  s.style.opacity=.3+Math.random()*.7;
  sf.appendChild(s);
}

const themes = [
  {id:'forest',name:'森林漫步',ic:'🌲',quote:'听风穿过树叶，听鸟在远处歌唱。'},
  {id:'ocean',name:'海浪冥想',ic:'🌊',quote:'让海浪带走所有的思绪。'},
  {id:'rain',name:'雨夜雨声',ic:'🌧️',quote:'雨声是天地最温柔的白噪音。'},
  {id:'lotus',name:'盘坐莲花',ic:'🌸',quote:'坐定，让一切如莲缓缓盛开。'},
  {id:'fire',name:'壁炉柴火',ic:'🔥',quote:'柴火噼啪，让心找到温暖的归宿。'},
  {id:'cloud',name:'云上冥想',ic:'☁️',quote:'像云一样自由，不为任何事停留。'}
];
const tl = document.getElementById('themeList');
let curTheme = themes[0];
themes.forEach((t,i)=>{
  const li = document.createElement('li');
  li.className='theme-item'+(i===0?' active':'');
  li.innerHTML = `<div class="t-ic">${t.ic}</div><div class="t-body"><h5>${t.name}</h5><small>${t.quote}</small></div>`;
  li.addEventListener('click',()=>{
    document.querySelectorAll('.theme-item').forEach(x=>x.classList.remove('active'));
    li.classList.add('active');
    curTheme = t;
    document.getElementById('medIcon').textContent = t.ic;
    document.getElementById('quote').textContent = t.quote;
  });
  tl.appendChild(li);
});

let durMin=5, remain=300, running=false, timer=null;
const $ = id => document.getElementById(id);

document.querySelectorAll('.dur-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    if(running) return;
    document.querySelectorAll('.dur-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    durMin = +b.dataset.min; remain = durMin*60;
    updateTimer();
  });
});
function updateTimer(){
  const m=Math.floor(remain/60), s=remain%60;
  $('timer').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
$('startBtn').addEventListener('click',()=>{
  if(running){
    running=false; clearInterval(timer); $('startBtn').textContent='▶ 继续';
    return;
  }
  running=true; $('startBtn').textContent='⏸ 暂停';
  timer = setInterval(()=>{
    remain--; updateTimer();
    if(remain<=0){
      clearInterval(timer); running=false;
      $('startBtn').textContent='▶ 开始冥想';
      const total = +(localStorage.getItem('sm_meditationMin')||0) + durMin;
      localStorage.setItem('sm_meditationMin', total);
      logActivity('冥想完成',{minutes:durMin,theme:curTheme.id});
      toast('🌿 冥想完成，给自己一个微笑','ok');
      $('quote').textContent = '✨ 太棒了！冥想完成。';
      remain = durMin*60; updateTimer();
    }
  },1000);
});
$('resetBtn').addEventListener('click',()=>{
  running=false; clearInterval(timer); remain=durMin*60; updateTimer();
  $('startBtn').textContent='▶ 开始冥想';
});
updateTimer();
</script>
</body>
</html>
