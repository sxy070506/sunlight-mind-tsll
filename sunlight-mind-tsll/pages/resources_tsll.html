<!-- Generated by Trae Work -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资源库 · 晴心</title>
<link rel="stylesheet" href="../assets/css/site_tsll.css">
<style>

:root{
  --accent:#F5A623;
  --accent-light:rgba(245,166,35,.15);
  --muted:#777;
  --rule:#e8e8e8;
  --shadow:0 4px 12px rgba(0,0,0,0.06);
  --transition-base:0.25s ease;
}
*{box-sizing:border-box}


.page-hero{
  text-align: left;
  margin:30px 0 24px;
  padding: 40px 48px;
  border-radius: 24px;
  background: linear-gradient(90deg, #ffe8c2, #ffc8bc, #ffddaa);
  animation:heroIn .7s ease forwards;
}
@keyframes heroIn{
  from{opacity:0;transform:translateY(-16px)}
  to{opacity:1;transform:translateY(0)}
}
.page-hero h1{
  font-size:32px;
  margin:0 0 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.page-hero p{
  color:var(--muted);
  font-size: 18px;
  margin:0;
}

.filter-count{
  text-align:right;margin:-10px 0 14px;font-size:13px;color:var(--muted);
}
.filter-count strong{color:var(--accent);font-weight:600}


.tab-row{
  display:flex;gap:8px;margin-bottom:18px;background:#fff;padding:6px;border-radius:14px;
  box-shadow:var(--shadow);overflow-x:auto;scrollbar-width:none;
}
.tab-row::-webkit-scrollbar{display:none}
.tab-row button{
  padding:10px 18px;border:none;background:transparent;font-size:14px;font-weight:600;
  color:var(--muted);cursor:pointer;border-radius:10px;white-space:nowrap;
  transition:var(--transition-base);position:relative;overflow:hidden;
}
.tab-row button.active{background:linear-gradient(135deg,#F5A623,#FF8C42);color:#fff}
.tab-row button:hover:not(.active){transform:scale(1.05)}


.cat-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.cat-bar .tag{
  cursor:pointer;background:#fff;border:2px solid var(--rule);padding:6px 14px;
  border-radius:99px;font-size:13px;transition:var(--transition-base);user-select:none;
}
.cat-bar .tag.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-bar .tag:hover:not(.active){transform:scale(1.03);border-color:var(--accent-light)}


.search-bar{display:flex;gap:10px;margin-bottom:20px;position:relative}
.search-bar input{
  flex:1;padding:12px 18px;border:2px solid var(--rule);border-radius:999px;
  background:#fff;font-size:14px;outline:none;transition:var(--transition-base);
}
.search-bar input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-light);
  transform:scale(1.01);
}

.search-clear{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  width:22px;height:22px;border-radius:50%;background:#eee;color:#666;
  border:none;cursor:pointer;display:none;transition:.2s;
}
.search-clear.show{display:block}
.search-clear:hover{background:#ddd}


.res-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;min-height:220px}
.res-card{
  background:#fff;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);
  cursor:pointer;transition:var(--transition-base);text-decoration:none;color:inherit;display:block;
  opacity:0;transform:translateY(20px);animation:cardIn 0.4s ease forwards;
  position:relative;
}

.collect-btn{
  position:absolute;top:10px;right:10px;width:30px;height:30px;
  border-radius:50%;background:rgba(255,255,255,.85);border:none;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  z-index:9;cursor:pointer;transition:.2s;backdrop-filter:blur(2px);
}
.collect-btn.collected{color:#ff5c5c}
.collect-btn:active{transform:scale(1.2)}

.res-grid .res-card:nth-child(1){animation-delay:0.05s;}
.res-grid .res-card:nth-child(2){animation-delay:0.1s;}
.res-grid .res-card:nth-child(3){animation-delay:0.15s;}
.res-grid .res-card:nth-child(4){animation-delay:0.2s;}
.res-grid .res-card:nth-child(5){animation-delay:0.25s;}
.res-grid .res-card:nth-child(6){animation-delay:0.3s;}
.res-grid .res-card:nth-child(7){animation-delay:0.35s;}
.res-grid .res-card:nth-child(8){animation-delay:0.4s;}
.res-grid .res-card:nth-child(9){animation-delay:0.45s;}
.res-grid .res-card:nth-child(10){animation-delay:0.5s;}
.res-grid .res-card:nth-child(11){animation-delay:0.55s;}
.res-grid .res-card:nth-child(12){animation-delay:0.6s;}

@keyframes cardIn{
  to{opacity:1;transform:translateY(0);}
}

.res-grid.fade-out .res-card{
  animation:none !important;
  opacity:0;transform:translateY(10px);
}
.res-card:hover{transform:translateY(-6px);box-shadow:0 20px 40px rgba(245,166,35,.18)}


.res-cover{position:relative;aspect-ratio:16/10;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:60px}
.res-cover img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0;transition:transform 0.4s ease;}
.res-card:hover .res-cover img{transform:scale(1.08);}
.res-cover.has-real{font-size:0}
.res-cover .res-emoji{position:relative;z-index:1}
.cv1{background:linear-gradient(135deg,#A6D8E7,#7BC4A0)}
.cv2{background:linear-gradient(135deg,#FFB7B2,#F5A623)}
.cv3{background:linear-gradient(135deg,#FFDFA0,#FFB347)}
.cv4{background:linear-gradient(135deg,#7BC4A0,#A6D8E7)}
.cv5{background:linear-gradient(135deg,#FFD580,#FFB7B2)}
.cv6{background:linear-gradient(135deg,#A6D8E7,#FFDFA0)}
.cv7{background:linear-gradient(135deg,#F5A623,#7BC4A0)}
.cv8{background:linear-gradient(135deg,#7BC4A0,#FFB347)}

.duration-tag{position:absolute;bottom:10px;right:10px;background:rgba(0,0,0,.55);color:#fff;font-size:11px;padding:3px 8px;border-radius:6px;z-index:2}
.res-body{padding:14px}
.res-body h4{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.4}
.res-body p{font-size:12px;color:var(--muted);line-height:1.5;height:36px;overflow:hidden}
.res-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;font-size:11px;color:var(--muted)}


.skeleton-card{background:#f6f6f6;border-radius:16px;overflow:hidden}
.skeleton-cover{aspect-ratio:16/10;background:#eee;position:relative;overflow:hidden}
.skeleton-line{height:14px;background:#eee;border-radius:4px;margin:8px 14px}
.skeleton-line.sm{width:40%}

@keyframes skeletonShine{
  0%{transform:translateX(-100%) skewX(-20deg)}
  100%{transform:translateX(200%) skewX(-20deg)}
}
.skeleton-cover::after,.skeleton-line::after{
  content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
  animation:skeletonShine 1.2s infinite;
}


.empty-wrap{
  grid-column:1/-1;text-align:center;padding:60px 20px;opacity:0;
  animation:emptyIn .5s ease forwards;
}
@keyframes emptyIn{to{opacity:1}}
.empty-wrap .empty-icon{font-size:52px;margin-bottom:12px;opacity:.7}
.empty-wrap p{color:var(--muted);margin-bottom:16px}
.empty-wrap button{
  padding:8px 18px;border:none;border-radius:99px;background:var(--accent);
  color:#fff;cursor:pointer;transition:.2s;
}
.empty-wrap button:hover{opacity:.9}


.back-top{
  position:fixed;
  right:28px;
  bottom:36px;
  width:48px;
  height:48px;
  border-radius:50%;
  border:none;

  background:linear-gradient(135deg,#F5A623,#FF8C42);
  box-shadow:0 6px 16px rgba(245,166,35,0.28);
  font-size:20px;
  color:#fff;
  cursor:pointer;
  opacity:0;
  visibility:hidden;
  transition:all 0.3s cubic-bezier(0.25,0.8,0.25,1);
  z-index:999;
  display:flex;
  align-items:center;
  justify-content:center;

  transform:translateY(12px) rotate(-5deg);
}

.back-top.show{
  opacity:1;
  visibility:visible;
  transform:translateY(0) rotate(0deg);
}

.back-top:hover{
  transform:translateY(-6px) scale(1.08);
  box-shadow:0 10px 24px rgba(245,166,35,0.35);
}

.back-top:active{
  transform:translateY(-2px) scale(0.96);
  transition:all 0.15s ease;
}

@media (max-width:500px){
  .back-top{
    width:42px;
    height:42px;
    right:18px;
    bottom:24px;
    font-size:18px;
  }
}


@media (max-width:900px){.res-grid{grid-template-columns:repeat(2,1fr)}}
@media (max-width:500px){
  .res-grid{grid-template-columns:1fr}
  .page-hero h1{font-size:24px}
  .tab-row button{padding:8px 14px;font-size:13px}
}
</style>
</head>
<body>

<main class="wrap" style="max-width:1200px;margin:0 auto;padding:20px;">
  <div class="page-hero">
    <h1>📚 资源库</h1>
    <p>书籍、视频、播客、文章——治愈系内容随心选。</p>
  </div>

  <div class="filter-count" id="filterCount">共匹配 <strong>0</strong> 条资源</div>

  <div class="tab-row">
    <button class="active" data-type="all">🌟 全部</button>
    <button data-type="video">🎬 视频</button>
    <button data-type="book">📖 书籍</button>
    <button data-type="audio">🎧 播客</button>
    <button data-type="article">📰 文章</button>
  </div>

  <div class="cat-bar" id="catBar">
    <span class="tag active" data-cat="">全部分类</span>
    <span class="tag" data-cat="焦虑">焦虑缓解</span>
    <span class="tag" data-cat="抑郁">抑郁陪伴</span>
    <span class="tag" data-cat="睡眠">睡眠改善</span>
    <span class="tag" data-cat="自我">自我成长</span>
    <span class="tag" data-cat="人际">人际关系</span>
    <span class="tag" data-cat="正念">正念冥想</span>
  </div>

  <div class="search-bar">
    <input id="searchInput" placeholder="🔍 搜索资源... Ctrl+F 快速聚焦">
    <button class="search-clear" id="searchClear">✕</button>
  </div>

  <div class="res-grid" id="resGrid"></div>

  
  <button class="back-top" id="backTop">↑</button>
</main>

<script src="../assets/js/site_tsll.js"></script>
<script>
injectTopbar('resources');
injectContactBar();

const RESOURCES = [
  {id:1,type:'video',cat:'正念',title:'5 分钟海浪冥想',desc:'跟随海浪节奏放松身心',cover:'cv1',ic:'🌊',views:'23.4k',duration:'5:32',img:'video-cover-1.jpg'},
  {id:2,type:'book',cat:'自我',title:'《被讨厌的勇气》',desc:'阿德勒心理学经典之作',cover:'cv2',ic:'📖',views:'5.2k',duration:'350 页',img:'book-cover-1.jpg'},
  {id:3,type:'video',cat:'焦虑',title:'4-7-8 呼吸引导',desc:'由心理学博士亲自示范',cover:'cv3',ic:'🌬️',views:'18.6k',duration:'3:12',img:'video-cover-2.jpg'},
  {id:4,type:'audio',cat:'睡眠',title:'白噪音助眠 · 雨声',desc:'帮助快速入眠的雨声循环',cover:'cv4',ic:'🌧️',views:'42.1k',duration:'60:00',img:'audio-cover-1.jpg'},
  {id:5,type:'book',cat:'抑郁',title:'《蛤蟆先生去看心理医生》',desc:'温暖的成人心理寓言',cover:'cv5',ic:'🐸',views:'8.9k',duration:'160 页',img:'book-cover-2.jpg'},
  {id:6,type:'article',cat:'人际',title:'如何拒绝别人不内疚？',desc:'5 个温柔但有力的方法',cover:'cv6',ic:'✋',views:'12.3k',duration:'8 分钟阅读',img:'article-cover-1.jpg'},
  {id:7,type:'video',cat:'抑郁',title:'今天我又哭了，但没关系',desc:'真实的大学生情绪记录',cover:'cv7',ic:'💧',views:'9.8k',duration:'12:45',img:'video-cover-3.jpg'},
  {id:8,type:'audio',cat:'正念',title:'晨间正念引导冥想',desc:'10 分钟开启清晨好心情',cover:'cv8',ic:'☀️',views:'6.7k',duration:'10:00',img:'audio-cover-2.jpg'},
  {id:9,type:'book',cat:'焦虑',title:'《你的善良必须有点锋芒》',desc:'拒绝讨好型人格',cover:'cv1',ic:'🌱',views:'7.1k',duration:'280 页',img:'book-cover-3.jpg'},
  {id:10,type:'article',cat:'睡眠',title:'失眠时该做什么？',desc:'科学有效的 7 个方法',cover:'cv2',ic:'🌙',views:'15.2k',duration:'6 分钟阅读',img:'article-cover-2.jpg'},
  {id:11,type:'video',cat:'自我',title:'高敏感人格自救指南',desc:'拥抱你独特的敏感',cover:'cv3',ic:'🌸',views:'11.5k',duration:'14:20',img:'video-cover-4.jpg'},
  {id:12,type:'audio',cat:'焦虑',title:'减压音乐合集',desc:'纯音乐让心慢下来',cover:'cv4',ic:'🎵',views:'30.2k',duration:'45:00',img:'audio-cover-3.jpg'}
];


let curType='all', curCat='', curSearch='';
const $ = id => document.getElementById(id);
let collectList = JSON.parse(localStorage.getItem('resCollect') || '[]'); // 收藏本地存储


function renderSkeleton(){
  let html = '';
  for(let i=0;i<8;i++){
    html += `
    <div class="skeleton-card">
      <div class="skeleton-cover"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line sm"></div>
    </div>`
  }
  $('resGrid').innerHTML = html;
}
renderSkeleton();


function render(){
  const grid = $('resGrid');
  
  grid.classList.add('fade-out');
  setTimeout(()=>{
    const filtered = RESOURCES.filter(r=>{
      if(curType!=='all' && r.type!==curType) return false;
      if(curCat && r.cat!==curCat) return false;
      if(curSearch && !(r.title+r.desc).toLowerCase().includes(curSearch)) return false;
      return true;
    });
    
    $('filterCount').innerHTML = `共匹配 <strong>${filtered.length}</strong> 条资源`;
    
    if(curSearch) $('searchClear').classList.add('show');
    else $('searchClear').classList.remove('show');

    if(filtered.length === 0){
      grid.innerHTML = `
      <div class="empty-wrap">
        <div class="empty-icon">🔍</div>
        <p>没有找到匹配的资源，试试更换筛选条件</p>
        <button id="resetFilter">重置全部筛选</button>
      </div>`;
      
      $('resetFilter').onclick = resetAllFilter;
    }else{
      grid.innerHTML = filtered.map(r=>{
        const link = r.type==='video' ? `video_tsll.html?id=${r.id}` : `resource-detail_tsll.html?id=${r.id}`;
        const isCollected = collectList.includes(r.id);
        return `
        <a class="res-card" href="${link}" data-id="${r.id}">
          <button class="collect-btn ${isCollected ? 'collected' : ''}" data-res-id="${r.id}">${isCollected ? '❤️' : '🤍'}</button>
          <div class="res-cover ${r.cover}">
            <img src="../assets/images/${r.img}" alt="${r.title}封面" onload="this.parentElement.classList.add('has-real')" onerror="this.style.display='none'">
            <span class="res-emoji">${r.ic}</span>
            <div class="duration-tag">${r.duration}</div>
          </div>
          <div class="res-body">
            <h4>${r.title}</h4>
            <p>${r.desc}</p>
            <div class="res-meta"><span>${r.cat}</span><span>👁 ${r.views}</span></div>
          </div>
        </a>`;
      }).join('');
      
      document.querySelectorAll('.collect-btn').forEach(btn=>{
        btn.addEventListener('click',e=>{
          e.preventDefault();e.stopPropagation();
          const rid = Number(btn.dataset.resId);
          toggleCollect(rid,btn);
        })
      })
    }
    grid.classList.remove('fade-out');
  },220)
}


function toggleCollect(id,btn){
  const idx = collectList.indexOf(id);
  if(idx > -1){
    collectList.splice(idx,1);
    btn.classList.remove('collected');
    btn.innerText = '🤍';
  }else{
    collectList.push(id);
    btn.classList.add('collected');
    btn.innerText = '❤️';
  }
  localStorage.setItem('resCollect',JSON.stringify(collectList));
}


function resetAllFilter(){
  curType = 'all';curCat = '';curSearch = '';
  $('searchInput').value = '';

  document.querySelectorAll('.tab-row button').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab-row button[data-type="all"]').classList.add('active');

  document.querySelectorAll('.cat-bar .tag').forEach(t=>t.classList.remove('active'));
  document.querySelector('.cat-bar .tag[data-cat=""]').classList.add('active');
  render();
}


document.querySelectorAll('.tab-row button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-row button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); curType=b.dataset.type; render();
  });
});

document.querySelectorAll('.cat-bar .tag').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.cat-bar .tag').forEach(x=>x.classList.remove('active'));
    t.classList.add('active'); curCat=t.dataset.cat; render();
  });
});
$('searchInput').addEventListener('input',e=>{
  curSearch=e.target.value.trim().toLowerCase(); render();
});

$('searchClear').addEventListener('click',()=>{
  $('searchInput').value = '';
  curSearch = '';
  render();
})


window.addEventListener('keydown',e=>{
  if((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'f'){
    e.preventDefault();
    $('searchInput').focus();
  }
})


const backTopBtn = $('backTop');
window.addEventListener('scroll',()=>{
  if(window.scrollY > 320){
    backTopBtn.classList.add('show');
  }else{
    backTopBtn.classList.remove('show');
  }
})
backTopBtn.addEventListener('click',()=>{
  window.scrollTo({top:0,behavior:'smooth'})
})


window.addEventListener('load',()=>{
  setTimeout(render,350);
})
</script>
</body>
</html>
